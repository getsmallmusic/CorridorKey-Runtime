interface:
  display_name: ad-review
  short_description: Single-session two-axis code review (Codex variant of WORKFLOW §10). Reads diff + binding docs (AGENTS / ARCHITECTURE / GUIDELINES / CONTEXT / ADRs) + originating spec, writes audit trail to `.agentic/reviews/`, then reports findings inline under `## Standards Findings` and `## Spec Findings`. No `/clear`, no skill-spawned subagent. Optional user-initiated subagent escalation documented for §10 ideal.
policy:
  allow_implicit_invocation: true
