name: Build RTX20 DirectML

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 0

      # 1) 关键：激活 VS2022 环境，否则 CMake 找不到 cl.exe
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 2) 装 CUDA 12.9（官方 v0.8.4 开始用 12.9）
      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.9.0'
          method: 'network'

      - name: Patch for Turing (RTX 20xx)
        shell: pwsh
        run: |
          $cap = "src/host/gpu/capability.cpp"
          (Get-Content $cap) -replace 'props\.major < 8', 'props.major < 7 -or (props.major -eq 7 -and props.minor -lt 5)' | Set-Content $cap

          $cmake = "CMakeLists.txt"
          (Get-Content $cmake) -replace 'set\(CMAKE_CUDA_ARCHITECTURES.*\)', 'set(CMAKE_CUDA_ARCHITECTURES "75;80;86;89;90")' | Set-Content $cmake

      - name: Setup vcpkg
        shell: cmd
        run: |
          if not exist C:\vcpkg git clone https://github.com/microsoft/vcpkg C:\vcpkg
          call C:\vcpkg\bootstrap-vcpkg.bat

      - name: Configure
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          # 用 preset，架构已在上面 patch 好，不用再传 -D
          cmake --preset release

      - name: Build
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
        run: |
          # 正确传并行参数给 preset
          cmake --build --preset release --parallel 2

      - name: Collect OFX
        shell: pwsh
        run: |
          mkdir dist -Force | Out-Null
          # preset 的 binaryDir 是 build，根据 Ninja 单配置输出在 build/bin
          $src = Get-ChildItem -Path build -Recurse -Filter "CorridorKey.ofx.bundle" -Directory | Select-Object -First 1
          if (-not $src) { throw "找不到 CorridorKey.ofx.bundle，检查 build 目录" }
          xcopy $src.FullName dist\ /E /I /Y

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CorridorKey-RTX20-0.8.4
          path: dist/

