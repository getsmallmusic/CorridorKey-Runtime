name: Build RTX20 DirectML

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 240   # ← 从 120 改成 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.1'
          method: 'network'

      - name: Patch for Turing (RTX 20xx)
        shell: pwsh
        run: |
          $cap = "src/core/device_detection.cpp"
          (Get-Content $cap -Raw) -replace 'compute_capability_major >= 8', 'compute_capability_major > 7 || (compute_capability_major == 7 && compute_capability_minor >= 5)' | Set-Content $cap
          $cmake = "CMakeLists.txt"
          (Get-Content $cmake) -replace 'set\(CMAKE_CUDA_ARCHITECTURES.*\)', 'set(CMAKE_CUDA_ARCHITECTURES "75;80;86;89;90")' | Set-Content $cmake

      - name: Setup vcpkg
        shell: cmd
        run: |
          if not exist C:\vcpkg git clone https://github.com/microsoft/vcpkg C:\vcpkg
          call C:\vcpkg\bootstrap-vcpkg.bat

      # ← 新增：缓存 vcpkg 编好的包
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            build\vcpkg_installed
          key: vcpkg-${{ runner.os }}-static-${{ hashFiles('**/vcpkg.json', 'CMakeLists.txt') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-static-

      - name: Configure
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows-static
          VCPKG_BUILD_TYPE: release   # ← 关键：只编 release，不编 dbg
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          cmake --preset release -DVCPKG_TARGET_TRIPLET=x64-windows-static -DVCPKG_BUILD_TYPE=release

      - name: Build
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows-static
          VCPKG_BUILD_TYPE: release
        run: |
          cmake --build --preset release --parallel 2

      - name: Collect OFX
        shell: pwsh
        run: |
          mkdir dist -Force | Out-Null
          $src = Get-ChildItem -Path build -Recurse -Filter "CorridorKey.ofx.bundle" -Directory | Select-Object -First 1
          if (-not $src) { throw "找不到 CorridorKey.ofx.bundle" }
          xcopy $src.FullName dist\ /E /I /Y

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CorridorKey-RTX20-0.8.4
          path: dist/

