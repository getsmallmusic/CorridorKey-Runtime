name: Build RTX20 DirectML

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 0

      - name: Patch for Turing (RTX 20xx)
        shell: pwsh
        run: |
          # 1) 放宽 GPU 检查：8.0 → 7.5
          $cap = "src/host/gpu/capability.cpp"
          (Get-Content $cap) -replace 'props\.major < 8', 'props.major < 7 -or (props.major -eq 7 -and props.minor -lt 5)' | Set-Content $cap

          # 2) 让 CMake 也编 sm_75
          $cmake = "CMakeLists.txt"
          (Get-Content $cmake) -replace 'set\(CMAKE_CUDA_ARCHITECTURES .*\)', 'set(CMAKE_CUDA_ARCHITECTURES "75;80;86;89;90")' | Set-Content $cmake

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
        shell: cmd

      - name: Build
        env:
          VCPKG_ROOT: C:\vcpkg
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          cmake --preset release -DCMAKE_CUDA_ARCHITECTURES="75;80;86;89;90"
          cmake --build --preset release -j 2
        shell: pwsh

      - name: Collect OFX
        run: |
          mkdir dist
          xcopy build\release\bin\CorridorKey.ofx.bundle dist\ /E /I
        shell: cmd

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CorridorKey-RTX20-0.8.4
          path: dist/

