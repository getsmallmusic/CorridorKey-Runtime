name: Build 0.8.4 for RTX 20-series

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 0

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
        shell: cmd

      - name: Allow PowerShell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force
        shell: pwsh

      - name: Build only (skip release checks)
        env:
          VCPKG_ROOT: C:\vkg
          VCPKG_ROOT: C:\vcpkg
        run: |
          .\scripts\windows.ps1 -Task build -Preset release
        shell: pwsh

      - name: Package DirectML manually
        env:
          VCPKG_ROOT: C:\vcpkg
        run: |
          # 直接用 build 产物，不走 release_pipeline
          mkdir build\dist
          xcopy /E /I build\release\bin build\dist\CorridorKey\
        shell: cmd

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: CorridorKey-0.8.4-RTX20-DirectML
          path: build/dist/
          retention-days: 7

