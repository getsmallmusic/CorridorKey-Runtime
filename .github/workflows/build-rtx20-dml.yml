name: Build RTX20 DirectML
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true, submodules: recursive, fetch-depth: 0 }
      - uses: ilammy/msvc-dev-cmd@v1
        with: { arch: x64 }
      - uses: Jimver/cuda-toolkit@v0.2.35
        with: { cuda: '12.9.1', method: 'network' }

      - name: Patch for Turing
        shell: pwsh
        run: |
          $cap = "src/core/device_detection.cpp"
          (Get-Content $cap -Raw) -replace 'compute_capability_major >= 8', 'compute_capability_major > 7 || (compute_capability_major == 7 && compute_capability_minor >= 5)' | Set-Content $cap
          (Get-Content CMakeLists.txt) -replace 'set\(CMAKE_CUDA_ARCHITECTURES.*\)', 'set(CMAKE_CUDA_ARCHITECTURES "75;80;86;89;90")' | Set-Content CMakeLists.txt

      - name: Prepare ORT DirectML
        shell: pwsh
        run: |
          $ortRoot = "vendor/onnxruntime-windows-dml"
          New-Item -ItemType Directory -Force -Path $ortRoot | Out-Null
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.21.2/onnxruntime-win-x64-1.21.2.zip" -OutFile ort.zip
          Expand-Archive ort.zip -DestinationPath ort_temp
          Copy-Item ort_temp/onnxruntime-win-x64-1.21.2/include $ortRoot/include -Recurse -Force
          Copy-Item ort_temp/onnxruntime-win-x64-1.21.2/lib $ortRoot/lib -Recurse -Force

      - name: Setup vcpkg
        shell: cmd
        run: |
          if not exist C:\vcpkg git clone https://github.com/microsoft/vcpkg C:\vcpkg
          call C:\vcpkg\bootstrap-vcpkg.bat

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            build\vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}

      - name: Configure
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows-static
          VCPKG_BUILD_TYPE: release
        run: cmake --preset release -DVCPKG_TARGET_TRIPLET=x64-windows-static -DVCPKG_BUILD_TYPE=release

      - name: Build
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
        run: cmake --build --preset release --parallel 2

      - name: Collect OFX
        shell: pwsh
        run: |
          mkdir dist -Force | Out-Null
          $src = Get-ChildItem -Path build -Recurse -Filter "CorridorKey.ofx.bundle" -Directory | Select-Object -First 1
          xcopy $src.FullName dist\ /E /I /Y

      - uses: actions/upload-artifact@v4
        with:
          name: CorridorKey-RTX20-0.8.4
          path: dist/

