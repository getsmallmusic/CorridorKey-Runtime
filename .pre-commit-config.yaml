exclude: '^vendor/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c, header]

  - repo: local
    hooks:
      - id: docs-consistency
        name: docs-consistency
        entry: python scripts/check_docs_consistency.py
        language: system
        files: '^(README\.md|CONTRIBUTING\.md|AGENTS\.md|CLAUDE\.md|docs/.*\.md|help/.*\.md|\.github/PULL_REQUEST_TEMPLATE\.md)$'
